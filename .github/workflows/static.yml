name: Test and Deploy

on:
  push:
    branches: ["master"]
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Permissions required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # agent-browser downloads a Chromium binary used by the test suite
      - name: Install agent-browser
        run: npm i -g agent-browser && agent-browser install

      - name: Run tests
        run: |
          # Xvfb provides a virtual display so Chromium can run headless on CI
          export DISPLAY=:99
          Xvfb :99 -screen 0 1920x1080x24 &
          npm test

  # Deploy only runs if the test job succeeds
  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v4
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
